# Multi-stage pipeline: Build -> Deploy Dev -> Deploy Prod
# Deployment jobs target environments; configure approvals/checks
# on the "production" environment in the Azure DevOps portal.

trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'

stages:
  - stage: Build
    displayName: 'Build & Test'
    jobs:
      - job: Build
        steps:
          - script: echo "Restore, build, and test here..."
            displayName: 'Build & test'
          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)'
              artifact: 'drop'

  - stage: DeployDev
    displayName: 'Deploy to Dev'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployDev
        environment: 'dev'
        strategy:
          runOnce:
            deploy:
              steps:
                - script: echo "Deploying to Dev..."
                  displayName: 'Deploy to Dev'

  - stage: DeployProd
    displayName: 'Deploy to Production'
    dependsOn: DeployDev
    condition: succeeded()
    jobs:
      - deployment: DeployProd
        environment: 'production'   # add approvals/checks on this environment
        strategy:
          runOnce:
            deploy:
              steps:
                - script: echo "Deploying to Production..."
                  displayName: 'Deploy to Prod'
